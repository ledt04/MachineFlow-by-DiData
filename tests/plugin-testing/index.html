<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>96 Well Plate Editor - Balanced Layout</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-empty: #4a90c4;
      --color-sample: #4CAF50;
      --color-blank: #e05a4e;
      --color-ladder: #7c6fd4;
      --color-bg-sec: #f9f9f9;
      --color-border: #ddd;
      --radius: 10px;
    }
    
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 24px; color: #333; }
    .wrapper { display: flex; gap: 16px; align-items: flex-start; max-width: 1300px; margin: 0 auto; }
    
    /* Plate Styling */
    .plate-wrap { flex: 3; min-width: 0; }
    .plate-grid {
      display: grid;
      grid-template-columns: 24px repeat(12, 1fr);
      grid-template-rows: 24px repeat(8, 1fr);
      gap: 4px;
      background: var(--color-bg-sec);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 12px;
    }

    .axis-label { display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #999; }
    
    .well {
      border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 600; transition: all 0.15s ease;
      aspect-ratio: 1; user-select: none; color: white;
    }

    .well.sample { background: var(--color-sample); cursor: grab; }
    .well.empty { background: var(--color-empty); }
    .well.blank { background: var(--color-blank); }
    .well.ladder { background: var(--color-ladder); }
    .well.off { background: #cbd5e0 !important; color: #718096; }
    .well.active { outline: 2.5px solid #333; outline-offset: 1.5px; z-index: 2; }
    .well.drop-hover { transform: scale(1.15); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }

    /* Sidebar Styling */
    .sidebar {
      flex: 1; min-width: 30px;
      background: var(--color-bg-sec);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      display: flex; flex-direction: column;
      /* Height is set dynamically by JS to match plate-grid */
    }
    
    .sidebar-header { 
      padding: 10px 12px; font-size: 11px; font-weight: 700; color: #777; 
      text-transform: uppercase; border-bottom: 1px solid var(--color-border); 
    }
    
    .sidebar-list { overflow-y: auto; flex: 1; }
    .sidebar-list::-webkit-scrollbar { width: 4px; }
    .sidebar-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    
    .well-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-bottom: 0.5px solid var(--color-border); cursor: pointer; }
    .well-row:hover { background: #fff; }
    .well-row.active { background: #fff; box-shadow: inset 3px 0 0 #333; }
    
    .row-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .row-addr { font-size: 11px; font-weight: 700; width: 28px; }
    .row-name-input { 
      flex: 1; border: none; padding: 2px 4px; font-size: 11px; 
      background: transparent; border-bottom: 1px solid transparent;
    }
    .row-name-input:focus { border-bottom-color: #aaa; outline: none; background: white; }

    /* Compact Switch */
    .switch { position: relative; display: inline-block; width: 26px; height: 14px; margin-left: auto; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .2s; border-radius: 14px; }
    .slider:before { position: absolute; content: ""; height: 10px; width: 10px; left: 2px; top: 2px; background-color: white; transition: .2s; border-radius: 50%; }
    input:checked + .slider { background-color: #4CAF50; }
    input:checked + .slider:before { transform: translateX(12px); }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="plate-wrap">
    <div class="plate-grid" id="plate"></div>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">Well contents</div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </div>
</div>

<script>
  const ROWS = ['A','B','C','D','E','F','G','H'];
  const COLS = Array.from({length:12},(_,i)=>i+1);
  const BLANKS  = ['D11','H11'];
  const LADDERS = ['D12','H12'];
  
  let wellState = {}; 
  let sampleNames = {};
  let selectedWell = null;

  // Setup data
  ROWS.forEach(r => COLS.forEach(c => {
    const id = `${r}${c}`;
    sampleNames[id] = '';
    if (BLANKS.includes(id)) wellState[id] = { type: 'blank', active: true };
    else if (LADDERS.includes(id)) wellState[id] = { type: 'ladder', active: true };
    else wellState[id] = { type: 'empty', active: true };
  }));

  const initial = {'A1':'Sample_001','A2':'Sample_002','A3':'Sample_003','A4':'Sample_004'};
  for(let id in initial) {
    wellState[id].type = 'sample';
    sampleNames[id] = initial[id];
  }

  function syncSidebarHeight() {
    const plateHeight = document.getElementById('plate').offsetHeight;
    document.getElementById('sidebar').style.height = `${plateHeight}px`;
  }

  function initPlate() {
    const plateEl = document.getElementById('plate');
    plateEl.innerHTML = '';
    
    plateEl.appendChild(document.createElement('div'));
    COLS.forEach(c => {
      const div = document.createElement('div');
      div.className = 'axis-label';
      div.textContent = c;
      plateEl.appendChild(div);
    });

    ROWS.forEach(r => {
      const label = document.createElement('div');
      label.className = 'axis-label';
      label.textContent = r;
      plateEl.appendChild(label);

      COLS.forEach(c => {
        const id = `${r}${c}`;
        const well = document.createElement('div');
        well.id = `well-${id}`;
        well.dataset.id = id;
        well.textContent = id;
        updateWellUI(well, id);
        
        well.onclick = () => selectWell(id);
        well.ondragstart = (e) => {
          if (wellState[id].type !== 'sample') return e.preventDefault();
          e.dataTransfer.setData("text/plain", id);
          e.target.style.opacity = "0.4";
        };
        well.ondragend = (e) => e.target.style.opacity = "1";
        well.ondragover = (e) => {
          e.preventDefault();
          if (wellState[id].type === 'empty') e.target.classList.add('drop-hover');
        };
        well.ondragleave = (e) => e.target.classList.remove('drop-hover');
        well.ondrop = (e) => {
          e.preventDefault();
          e.target.classList.remove('drop-hover');
          const sourceId = e.dataTransfer.getData("text/plain");
          if (sourceId !== id && wellState[id].type === 'empty') {
            wellState[id].type = 'sample';
            sampleNames[id] = sampleNames[sourceId];
            wellState[sourceId].type = 'empty';
            sampleNames[sourceId] = '';
            initPlate();
            selectWell(id);
          }
        };
        plateEl.appendChild(well);
      });
    });
    renderSidebar();
    // Use requestAnimationFrame to ensure the grid is painted before measuring height
    requestAnimationFrame(syncSidebarHeight);
  }

  function updateWellUI(el, id) {
    const state = wellState[id];
    el.className = `well ${state.type} ${!state.active ? 'off' : ''} ${selectedWell === id ? 'active' : ''}`;
    el.draggable = (state.type === 'sample');
  }

  function selectWell(id) {
    if (selectedWell) document.getElementById(`well-${selectedWell}`)?.classList.remove('active');
    selectedWell = id;
    document.getElementById(`well-${id}`)?.classList.add('active');
    renderSidebar();
    const row = document.querySelector(`[data-row-id="${id}"]`);
    if(row) row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function renderSidebar() {
    const container = document.getElementById('sidebar-list');
    container.innerHTML = '';

    ROWS.forEach(r => COLS.forEach(c => {
      const id = `${r}${c}`;
      const state = wellState[id];
      const row = document.createElement('div');
      row.className = `well-row ${selectedWell === id ? 'active' : ''}`;
      row.dataset.rowId = id;
      row.onclick = () => selectWell(id);

      const dot = document.createElement('div');
      dot.className = 'row-dot';
      dot.style.backgroundColor = state.active ? `var(--color-${state.type})` : '#ccc';

      const addr = document.createElement('div');
      addr.className = 'row-addr';
      addr.textContent = id;

      row.appendChild(dot);
      row.appendChild(addr);

      if (state.type === 'sample') {
        const input = document.createElement('input');
        input.className = 'row-name-input';
        input.value = sampleNames[id];
        input.placeholder = "Name...";
        input.onchange = (e) => { sampleNames[id] = e.target.value; };
        input.onclick = (e) => e.stopPropagation();
        row.appendChild(input);
      } else {
        const label = document.createElement('span');
        label.style.fontSize = '11px';
        label.style.color = (state.type === 'empty') ? '#aaa' : '#666';
        label.textContent = (state.type === 'empty') ? '—' : state.type.charAt(0).toUpperCase() + state.type.slice(1);
        row.appendChild(label);

        if (state.type !== 'empty') {
          const sw = document.createElement('label');
          sw.className = 'switch';
          sw.innerHTML = `<input type="checkbox" ${state.active ? 'checked' : ''}> <span class="slider"></span>`;
          sw.onclick = (e) => e.stopPropagation();
          sw.onchange = (e) => {
            wellState[id].active = e.target.checked;
            updateWellUI(document.getElementById(`well-${id}`), id);
            dot.style.backgroundColor = e.target.checked ? `var(--color-${state.type})` : '#ccc';
          };
          row.appendChild(sw);
        }
      }
      container.appendChild(row);
    }));
  }

  window.addEventListener('resize', syncSidebarHeight);
  initPlate();
</script>

</body>
</html>
