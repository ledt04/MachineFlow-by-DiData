      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 40
                    user_type:
                      type: string
                      example: App\Models\User
                    user_id:
                      type: integer
                      example: 2
                    event:
                      type: string
                      example: created
                    auditable_type:
                      type: string
                      example: App\Models\AccessRights\Projects\Project
                    auditable_id:
                      type: integer
                      example: 1
                    old_values:
                      type: array
                      example: []
                    new_values:
                      type: object
                      properties:
                        name:
                          type: string
                          example: p1
                        updated_at:
                          type: string
                          example: '2022-04-17 23:47:57'
                        created_at:
                          type: string
                          example: '2022-04-17 23:47:57'
                        id:
                          type: integer
                          example: 1
                    url:
                      type: string
                      example: 'http://127.0.0.1:8000/api/V4.2/access-rights/projects'
                    ip_address:
                      type: string
                      example: 127.0.0.1
                    user_agent:
                      type: string
                      example: PostmanRuntime/7.29.0
                    tags:
                      type: string
                      example: null
                    created_at:
                      type: string
                      example: '17-04-2022 21:47:57'
                    updated_at:
                      type: string
                      example: '17-04-2022 21:47:57'
                example:
                  -
                    id: 40
                    user_type: App\Models\User
                    user_id: 2
                    event: created
                    auditable_type: App\Models\AccessRights\Projects\Project
                    auditable_id: 1
                    old_values: []
                    new_values:
                      name: p1
                      updated_at: '2022-04-17 23:47:57'
                      created_at: '2022-04-17 23:47:57'
                      id: 1
                    url: 'http://127.0.0.1:8000/api/V4.2/access-rights/projects'
                    ip_address: 127.0.0.1
                    user_agent: PostmanRuntime/7.29.0
                    tags: null
                    created_at: '17-04-2022 21:47:57'
                    updated_at: '17-04-2022 21:47:57'
      tags:
        - AccessRights\Project
    parameters:
      -
        in: path
        name: project_id
        description: 'The ID of the project.'
        example: 1
        required: true
        schema:
          type: integer
      -
        in: path
        name: project
        description: 'ID of the project to audit'
        example: 16
        required: true
        schema:
          type: integer
