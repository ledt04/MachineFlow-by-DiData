              schema:
                type: string
                example: 'null'
      tags:
        - AccessRights\Project
    parameters:
      -
        in: path
        name: project_id
        description: 'The ID of the project.'
        example: 1
        required: true
        schema:
          type: integer
      -
        in: path
        name: project
        description: 'The project id.'
        example: 1
        required: true
        schema:
          type: integer
  '/api/access-rights/projects/audits/{project_id}':
    get:
      summary: 'Audit project'
      operationId: auditProject
      description: ''
      parameters:
        -
          in: header
          name: Didata-Project-Id
