paths:
  /api/access-rights/permissions:
    get:
      summary: 'List permissions'
      operationId: listPermissions
      description: ''
      parameters:
        -
          in: header
          name: Didata-Project-Id
          description: ''
          example: 1
          schema:
            type: string
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: string
                      example: access_to_sensitive_fields
                    description:
                      type: string
                      example: 'Access to sensitive fields'
                    groups:
                      type: array
                      example:
                        - Fields
                        - DataView
                        - Forms
                      items:
                        type: string
                example:
                  -
                    code: access_to_sensitive_fields
                    description: 'Access to sensitive fields'
                    groups:
                      - Fields
                      - DataView
                      - Forms
                  -
                    code: manage_all_projects
                    description: 'Manage all projects'
                    groups:
                      - Projects
                  -
                    code: create_field
                    description: 'Create field'
                    groups:
                      - Fields
                      - Forms
                  -
                    code: edit_field
                    description: 'Edit field'
                    groups:
                      - Fields
                  -
                    code: delete_field
                    description: 'Delete field'
                    groups:
                      - Fields
                  -
                    code: import_fields
                    description: 'Batch import of fields'
                    groups:
                      - Fields
                  -
                    code: edit_field_dynamic_tooltip
                    description: 'Edit field dynamic tooltip'
                    groups:
                      - Fields
                  -
                    code: create_entitytype
                    description: 'Create entity type'
                    groups:
                      - 'Entity types'
                  -
                    code: edit_entitytype
                    description: 'Edit entity type'
                    groups:
                      - 'Entity types'
                  -
                    code: delete_entitytype
                    description: 'Delete entity type'
                    groups:
                      - 'Entity types'
      tags:
        - AccessRights\Permission
  /api/access-rights/permissions/groups:
    get:
      summary: 'List supported permissions groups'
      operationId: listSupportedPermissionsGroups
      description: ''
      parameters:
        -
          in: header
          name: Didata-Project-Id
          description: ''
          example: 1
          schema:
            type: string
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example:
                  - Fields
                  - DataView
                  - Forms
                  - Projects
                  - 'Entity types'
                  - Configurations
                  - 'Study design'
                  - Workflows
                  - Storages
                  - DashBoards
                  - Users
                  - Rules
                  - Calculations
                  - Roles
                  - Others
                  - Files
                  - 'Forms links'
                  - Actions
                  - Routes
                  - 'Notifications manager'
                  - 'Choice category'
                  - Printers
                  - Plugins
                  - Favorites
                  - Languages
      tags:
        - AccessRights\Permission
  '/api/access-rights/permissions/{permission}':
    get:
      summary: 'Get permission'
      operationId: getPermission
      description: ''
      parameters:
        -
          in: header
          name: Didata-Project-Id
          description: ''
          example: 1
          schema:
            type: string
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: object
                example:
                  code: access_to_sensitive_fields
                  description: 'Access to sensitive fields'
                  groups:
                    - Fields
                    - DataView
                    - Forms
                properties:
                  code:
                    type: string
                    example: access_to_sensitive_fields
                  description:
                    type: string
                    example: 'Access to sensitive fields'
                  groups:
                    type: array
                    example:
                      - Fields
                      - DataView
                      - Forms
                    items:
                      type: string
      tags:
        - AccessRights\Permission
    parameters:
      -
        in: path
        name: permission
        description: 'The permission code (in:[see list permission response codes]).'
        example: access_to_sensitive_fields
        required: true
        schema:
          type: string
  /api/access-rights/projects:
    get:
      summary: 'List projects'
      operationId: listProjects
      description: 'show all projects (without users)'
      parameters:
        -
          in: header
          name: Didata-Project-Id
          description: ''
          example: 1
          schema:
            type: string
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    name:
                      type: string
                      example: Medic
                    icon:
                      type: object
                      properties:
                        code:
                          type: string
                          example: ezcze
                        color:
                          type: string
                          example: '#000000'
                    description:
                      type: string
                      example: null
                    parent_project_id:
                      type: integer
                      example: 1
                    created_at:
                      type: string
                      example: '2020-05-05 10:00:00'
                    updated_at:
                      type: string
                      example: '2020-05-05 10:00:00'
                example:
                  -
                    id: 1
                    name: Medic
                    icon:
                      code: ezcze
                      color: '#000000'
                    description: null
                    parent_project_id: 1
                    created_at: '2020-05-05 10:00:00'
                    updated_at: '2020-05-05 10:00:00'
                  -
                    id: 2
                    name: 'Asa Turner'
                    description: 'Ab accusamus qui voluptates et vitae sit consequatur sunt. Dolorum quaerat saepe itaque rerum. Fuga ullam maxime corrupti modi aut. Quia blanditiis voluptatum est veniam delectus quas perspiciatis.'
                    icon:
                      code: cezcez
                      color: '#000000'
                    parent_project_id: null
                    created_at: '2023-01-08T13:40:52.480000Z'
                    updated_at: '2023-01-08T13:40:52.480000Z'
                    userlanguage_id: null
      tags:
        - AccessRights\Project
    post:
      summary: 'Create project'
      operationId: createProject
      description: ''
      parameters:
        -
          in: header
          name: Didata-Project-Id
          description: ''
          example: 1
          schema:
            type: string
      responses:
        201:
          description: success
          content:
            text/plain:
              schema:
                type: string
                example: "{\n    \"description\": null,\n    \"icon\": {\n         \"code\": null,\n         \"color\": null\n    },\n    \"name\": \"Project\",\n    \"parent_project_id\": 1,\n    \"created_at\": \"2021-02-21 10:05:49.929\",\n    \"updated_at\": \"2021-02-21 10:05:49.929\"\n    \"id\": 1,\n}"
      tags:
        - AccessRights\Project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: (unique)
                  example: architecto
                description:
                  type: string
                  description: ''
                  example: 'Eius et animi quos velit et.'
                icon:
                  type: object
                  description: ''
                  example: []
                  properties:
                    code:
                      type: string
                      description: '(required_unless:icon,null).'
                      example: rocket
                    color:
                      type: string
                      description: .
                      example: '#000000'
                parent_project_id:
                  type: integer
                  description: 'The project id.'
                  example: 1
              required:
                - name
  '/api/access-rights/projects/{project_id}':
