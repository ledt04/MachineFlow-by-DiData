                  type: object
                  properties:
                    user_id:
                      type: integer
                      example: 1
                    project_id:
                      type: integer
                      example: 1
                    role_id:
                      type: integer
                      example: 2
                    assigned_by_id:
                      type: integer
                      example: 1
                    assigned_at:
                      type: string
                      example: '2020-07-23 16:05:41'
                example:
                  -
                    user_id: 1
                    project_id: 1
                    role_id: 2
                    assigned_by_id: 1
                    assigned_at: '2020-07-23 16:05:41'
                  -
                    user_id: 2
